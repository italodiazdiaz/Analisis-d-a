<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Análisis del Día</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#f7f7f5;--card:#fff;--border:#ececea;--text:#111;--text2:#666;--text3:#aaa;
    --green:#2d7a3a;--green-bg:#eaf4ec;--amber:#a05c00;--amber-bg:#fff3e0;
    --red:#b02020;--blue:#1a4fa0;--blue-bg:#eef2fc;
    --teal:#0a6e55;--teal-bg:#e6f5f0;--gray-bg:#f2f2f0;--gray:#666;
  }
  html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overscroll-behavior:none}
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
  .topbar{background:var(--card);padding:16px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  .topbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .app-title{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
  .app-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
  .refresh-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
  .refresh-btn:disabled{opacity:0.35;cursor:not-allowed}
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;text-align:center;font-size:12px;padding:10px 14px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;font-weight:500;white-space:nowrap}
  .tab.active{color:var(--text);border-bottom-color:var(--text)}
  .scroll-area{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
  .section-header{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
  .section-header:first-child{margin-top:0}
  .sh-line{flex:1;height:1px;background:var(--border)}
  .sh-count{background:var(--gray-bg);border-radius:20px;padding:2px 7px;font-size:9px;color:var(--text3)}
  .card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:15px;margin-bottom:8px}
  .card.comprar{border-color:#7dc87a}
  .card.esperar{border-color:#f0b840}
  .card.fuera{opacity:0.45}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
  .card-ticker{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-0.2px;font-family:'DM Mono',monospace}
  .card-name{font-size:11px;color:var(--text3);margin-bottom:12px}
  .metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
  .metric{background:var(--bg);border-radius:10px;padding:9px 6px;text-align:center}
  .mlabel{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;font-weight:500}
  .mval{font-size:16px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
  .mval.green{color:var(--green)}
  .mval.red{color:var(--red)}
  .mval.muted{color:var(--text3)}
  .card-foot{display:flex;justify-content:space-between;align-items:center}
  .badge{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .b-comprar{background:var(--green-bg);color:var(--green)}
  .b-esperar{background:var(--amber-bg);color:var(--amber)}
  .b-fuera{background:var(--gray-bg);color:var(--gray)}
  .b-dgi{background:var(--blue-bg);color:var(--blue)}
  .b-vaca{background:var(--teal-bg);color:var(--teal)}
  .b-oportunidad{background:var(--blue-bg);color:var(--blue)}
  .b-normal{background:var(--gray-bg);color:var(--gray)}
  .b-precaucion{background:var(--amber-bg);color:var(--amber)}
  .b-alto{background:var(--teal-bg);color:var(--teal)}
  .list-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:4px 16px}
  .emp-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
  .emp-row:last-child{border-bottom:none}
  .emp-left{display:flex;flex-direction:column;gap:2px}
  .emp-ticker{font-size:13px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace}
  .emp-name{font-size:10px;color:var(--text3)}
  .emp-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .emp-change{font-size:14px;font-weight:600;font-family:'DM Mono',monospace}
  .emp-change.pos{color:var(--green)}
  .emp-change.neg{color:var(--red)}
  .emp-change.neu{color:var(--text3)}
  .emp-dy{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
  .status-box{background:var(--card);border-radius:14px;padding:28px 20px;text-align:center;color:var(--text3);font-size:13px;border:1px solid var(--border);margin-top:4px;line-height:1.8}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--text3);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:5px}
  .pill-dot{width:7px;height:7px;border-radius:50%}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="app-title">Análisis del Día</div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()" disabled>↻ Actualizar</button>
    </div>
    <div class="app-date" id="app-date">Cargando datos...</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('analisis',this)">Análisis</div>
    <div class="tab" onclick="setTab('comprar',this)">✅ Comprar</div>
    <div class="tab" onclick="setTab('dgi',this)">🌱 DGI</div>
    <div class="tab" onclick="setTab('vaca',this)">🐄 Vacas</div>
    <div class="tab" onclick="setTab('lista',this)">Lista</div>
  </div>
  <div class="scroll-area" id="scroll-area">
    <div class="status-box"><span class="spinner"></span>Conectando con Yahoo Finance...</div>
  </div>
</div>
 
<script>
const STOCKS=[
  {ticker:'ANDINAA.SN',label:'ANDINAA',name:'Embotelladora Andina A'},
  {ticker:'ANDINAB.SN',label:'ANDINAB',name:'Embotelladora Andina B'},
  {ticker:'CHILE.SN',label:'CHILE',name:'Banco de Chile'},
  {ticker:'BSANTANDER.SN',label:'BSANTANDER',name:'Banco Santander'},
  {ticker:'BCI.SN',label:'BCI',name:'Banco BCI'},
  {ticker:'COLBUN.SN',label:'COLBUN',name:'Colbún'},
  {ticker:'ENELGXCH.SN',label:'ENELGXCH',name:'Enel Generación Chile'},
  {ticker:'ENELCHILE.SN',label:'ENELCHILE',name:'Enel Chile'},
  {ticker:'ENELAM.SN',label:'ENELAM',name:'Enel Américas'},
  {ticker:'COPEC.SN',label:'COPEC',name:'Empresas Copec'},
  {ticker:'CMPC.SN',label:'CMPC',name:'Empresas CMPC'},
  {ticker:'FALABELLA.SN',label:'FALABELLA',name:'Falabella'},
  {ticker:'CENCOSUD.SN',label:'CENCOSUD',name:'Cencosud'},
  {ticker:'CENCOMALLS.SN',label:'CENCOMALLS',name:'CencoMalls'},
  {ticker:'HABITAT.SN',label:'HABITAT',name:'AFP Hábitat'},
  {ticker:'PROVIDA.SN',label:'PROVIDA',name:'AFP ProVida'},
  {ticker:'PLANVITAL.SN',label:'PLANVITAL',name:'AFP PlanVital'},
  {ticker:'LIPIGAS.SN',label:'LIPIGAS',name:'Empresas Lipigas'},
  {ticker:'PEHUENCHE.SN',label:'PEHUENCHE',name:'Emp. Eléc. Pehuenche'},
  {ticker:'CCU.SN',label:'CCU',name:'Cías. Cervecerías Unidas'},
  {ticker:'CONCHATORO.SN',label:'CONCHATORO',name:'Viña Concha y Toro'},
  {ticker:'AGUAS-A.SN',label:'AGUAS-A',name:'Aguas Andinas A'},
  {ticker:'IAM.SN',label:'IAM',name:'Inv. Aguas Metropolitanas'},
  {ticker:'ENTEL.SN',label:'ENTEL',name:'Entel'},
  {ticker:'CAP.SN',label:'CAP',name:'CAP'},
  {ticker:'QUINENCO.SN',label:'QUINENCO',name:'Quiñenco'},
  {ticker:'MALLPLAZA.SN',label:'MALLPLAZA',name:'Plaza (MallPlaza)'},
  {ticker:'PARAUCO.SN',label:'PARAUCO',name:'Parque Arauco'},
  {ticker:'LTM.SN',label:'LTM',name:'LATAM Airlines'},
  {ticker:'SQM-B.SN',label:'SQM-B',name:'SQM Serie B'},
];
 
let allData=[], activeTab='analisis';
 
function classify(dy,per,group){
  if(group==='dgi') return dy>=5&&per!=null&&per<=12?'comprar':dy>=5?'esperar':'fuera';
  return dy>=7&&per!=null&&per<=15?'comprar':dy>=7?'esperar':'fuera';
}
function getGroup(dy){return dy>=7?'vaca':'dgi';}
function signalBadge(s){return s==='comprar'?'<span class="badge b-comprar">COMPRAR</span>':s==='esperar'?'<span class="badge b-esperar">ESPERAR</span>':'<span class="badge b-fuera">FUERA</span>';}
function valBadge(dy,per,group){
  if(group==='vaca') return dy>=9?'<span class="badge b-alto">ALTO YIELD</span>':per!=null&&per<=12?'<span class="badge b-oportunidad">OPORTUNIDAD</span>':'<span class="badge b-normal">NORMAL</span>';
  return per!=null&&per<=10?'<span class="badge b-oportunidad">OPORTUNIDAD</span>':per!=null&&per<=12?'<span class="badge b-comprar">PRECIO OK</span>':'<span class="badge b-precaucion">PER ALTO</span>';
}
function buildCard(d){
  const perStr=d.per!=null?d.per.toFixed(1)+'x':'N/D';
  const cambioStr=d.cambio!=null?(d.cambio>=0?'+':'')+d.cambio.toFixed(1)+'%':'—';
  const grpBadge=d.group==='vaca'?'<span class="badge b-vaca">🐄 VACA</span>':'<span class="badge b-dgi">🌱 DGI</span>';
  return `<div class="card ${d.signal}">
    <div class="card-top"><span class="card-ticker">${d.label}</span>${signalBadge(d.signal)}</div>
    <div class="card-name">${d.name}</div>
    <div class="metrics">
      <div class="metric"><div class="mlabel">DY</div><div class="mval ${d.dy>=5?'green':'muted'}">${d.dy.toFixed(2)}%</div></div>
      <div class="metric"><div class="mlabel">PER</div><div class="mval">${perStr}</div></div>
      <div class="metric"><div class="mlabel">Var. día</div><div class="mval ${d.cambio!=null?(d.cambio>=0?'green':'red'):'muted'}">${cambioStr}</div></div>
    </div>
    <div class="card-foot">${valBadge(d.dy,d.per,d.group)}${grpBadge}</div>
  </div>`;
}
function buildEmpRow(d){
  const cambioStr=d.cambio!=null?(d.cambio>=0?'+':'')+d.cambio.toFixed(1)+'%':'—';
  const cambioC=d.cambio!=null?(d.cambio>=0?'pos':'neg'):'neu';
  return `<div class="emp-row">
    <div class="emp-left"><span class="emp-ticker">${d.group==='vaca'?'🐄':'🌱'} ${d.label}</span><span class="emp-name">${d.name}</span></div>
    <div class="emp-right"><span class="emp-change ${cambioC}">${cambioStr}</span><span class="emp-dy">DY ${d.dy.toFixed(1)}% · PER ${d.per!=null?d.per.toFixed(1)+'x':'N/D'}</span></div>
  </div>`;
}
function renderTab(){
  if(!allData.length) return;
  const comprar=allData.filter(d=>d.signal==='comprar').sort((a,b)=>b.dy-a.dy);
  const vaca=allData.filter(d=>d.group==='vaca').sort((a,b)=>b.dy-a.dy);
  const dgi=allData.filter(d=>d.group==='dgi').sort((a,b)=>b.dy-a.dy);
  let html='';
  if(activeTab==='analisis'){
    html+=`<div class="summary">
      <div class="pill"><div class="pill-dot" style="background:#7dc87a"></div>${comprar.length} para comprar</div>
      <div class="pill"><div class="pill-dot" style="background:#185FA5"></div>${dgi.length} DGI</div>
      <div class="pill"><div class="pill-dot" style="background:#0a6e55"></div>${vaca.length} Vacas</div>
    </div>`;
    if(vaca.length){html+=`<div class="section-header"><span>🐄 Vacas Lecheras</span><span class="sh-count">${vaca.filter(d=>d.signal==='comprar').length} comprar</span><div class="sh-line"></div></div>`;vaca.forEach(d=>{html+=buildCard(d);});}
    if(dgi.length){html+=`<div class="section-header"><span>🌱 DGI</span><span class="sh-count">${dgi.filter(d=>d.signal==='comprar').length} comprar</span><div class="sh-line"></div></div>`;dgi.forEach(d=>{html+=buildCard(d);});}
  } else if(activeTab==='comprar'){
    html+=comprar.length?`<div class="section-header"><span>✅ Zona de compra</span><span class="sh-count">${comprar.length}</span><div class="sh-line"></div></div>`:'';
    comprar.length?comprar.forEach(d=>{html+=buildCard(d);}):html='<div class="status-box">No hay acciones en zona de compra hoy.</div>';
  } else if(activeTab==='dgi'){
    html+=`<div class="section-header"><span>🌱 DGI — DY ≥ 5%, PER ≤ 12x</span><span class="sh-count">${dgi.filter(d=>d.signal==='comprar').length} comprar</span><div class="sh-line"></div></div>`;
    dgi.forEach(d=>{html+=buildCard(d);});
  } else if(activeTab==='vaca'){
    html+=`<div class="section-header"><span>🐄 Vacas Lecheras — DY ≥ 7%, PER ≤ 15x</span><span class="sh-count">${vaca.filter(d=>d.signal==='comprar').length} comprar</span><div class="sh-line"></div></div>`;
    vaca.forEach(d=>{html+=buildCard(d);});
  } else if(activeTab==='lista'){
    const sorted=[...allData].sort((a,b)=>(b.cambio||0)-(a.cambio||0));
    html+='<div class="list-card">';sorted.forEach(d=>{html+=buildEmpRow(d);});html+='</div>';
  }
  document.getElementById('scroll-area').innerHTML=html;
}
function setTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTab();
}
async function loadData(){
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true;
  allData=[];
  document.getElementById('scroll-area').innerHTML='<div class="status-box"><span class="spinner"></span>Conectando con Yahoo Finance...</div>';
  try{
    const tickers=STOCKS.map(s=>s.ticker).join(',');
    const r=await fetch(`/api/quote?symbols=${encodeURIComponent(tickers)}`);
    const data=await r.json();
    const quotes=data?.quoteResponse?.result||[];
    quotes.forEach(q=>{
      const stock=STOCKS.find(s=>s.ticker===q.symbol);
      if(!stock) return;
      const dy=q.dividendYield!=null?q.dividendYield*100:null;
      if(!dy||dy<=0) return;
      const per=q.trailingPE||null;
      const cambio=q.regularMarketChangePercent||null;
      const grupo=getGroup(dy);
      allData.push({...stock,dy,per,cambio,precio:q.regularMarketPrice||null,group:grupo,signal:classify(dy,per,grupo)});
    });
    if(!allData.length) throw new Error('Sin datos de dividendo');
    document.getElementById('app-date').textContent=`${allData.length} empresas · ${new Date().toLocaleDateString('es-CL',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}`;
    renderTab();
  } catch(e){
    document.getElementById('scroll-area').innerHTML=`<div class="status-box">⚠️ No se pudo conectar.<br>Intenta de nuevo.<br><br><button class="refresh-btn" onclick="loadData()" style="cursor:pointer;padding:8px 16px">↻ Reintentar</button></div>`;
  }
  btn.disabled=false;
}
loadData();
</script>
</body>
</html>
